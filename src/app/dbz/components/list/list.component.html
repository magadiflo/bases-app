<h4>Listado</h4>
<ul class="list-group">
  <li *ngFor="
    let character of characters;
    let i = index;
    let isFirst = first;
    let isLast = last;
    let isEvent = even;
    let isOdd = odd;" class="list-group-item">
    <b class="text-primary">{{ i + 1 }}</b>° {{ character.name }} - <b>{{ character.power }}</b>
  </li>
</ul>
