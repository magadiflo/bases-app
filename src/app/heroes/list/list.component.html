<div class="container">
  <h1>Listado de héroes</h1>
  <h3>Héroe borrado: <small class="text-danger">xxx</small></h3>
  <div class="alert alert-warning">
    No hay ningún elemento
  </div>
  <button type="button" class="btn btn-danger">
    Borrar el último héroe
  </button>

  <ul class="list-group mt-2">
    <li class="list-group-item" *ngFor="let heroName of heroNames;">{{ heroName }}</li>
  </ul>
</div>
